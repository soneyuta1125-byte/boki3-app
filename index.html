{id:'C017',type:'choice',category:'incomeStatement',difficulty:'advanced',

// ===== 貸借対照表（10問） =====
{id:'C018',type:'choice',category:'balanceSheet',difficulty:'basic',

{id:'C019',type:'choice',category:'balanceSheet',difficulty:'basic',

 explanation:'流動・固定の区分（1年基準）：1年以内に現金化できる→流動資産。売掛金は通常数ヶ月で回収→流動資産。建物・土地は長期保有→固定資産（有形固定資産）。長期貸付金（1年超）→固定資産（投資その他の資産）。',
 examFrequency:'high'},
{id:'C020',type:'choice',category:'balanceSheet',difficulty:'standard',

 choices:['資産合計＋負債合計','資産合計－負債合計','負債合計－資産合計','（資産合計＋負債合計）÷2'],
 answer:1,
 explanation:'貸借対照表等式：資産＝負債＋純資産 → 純資産＝資産－負債。純資産は「自己資本」とも呼ばれ、借金（負債）を除いた本当の自社の財産です。純資産がプラスなら資産超過（健全）、マイナスなら債務超過（危険）です。',

 examFrequency:'high'},
{id:'C022',type:'choice',category:'balanceSheet',difficulty:'advanced',

{id:'C065',type:'choice',category:'balanceSheet',difficulty:'standard',

{id:'C066',type:'choice',category:'balanceSheet',difficulty:'advanced',

 explanation:'当期純利益は「繰越利益剰余金」（純資産）として貸借対照表に計上されます。利益が出た→自社の財産が増える→純資産が増加。逆に当期純損失なら純資産が減少します。利益を上げることが純資産（自己資本）の増加につながります。',

{id:'C067',type:'choice',category:'balanceSheet',difficulty:'basic',

 choices:['現金','売掛金','買掛金','繰越商品'],

 explanation:'資産の部：現金（流動資産）、売掛金（流動資産）、繰越商品（流動資産）など。買掛金は「負債の部」（流動負債）に記載されます。間違えやすいのは「掛け」という言葉。売掛金は資産（受取権利）、買掛金は負債（支払義務）です。',

{id:'C068',type:'choice',category:'balanceSheet',difficulty:'standard',

 answer:1,
 explanation:'貸借対照表の大原則：資産＝負債＋純資産。左右の合計は必ず一致（バランス）します。これが「バランスシート」の名前の由来です。変形すると：純資産＝資産−負債、負債＝資産−純資産。',

// ===== 精算表（10問） =====
{id:'C023',type:'choice',category:'worksheet',difficulty:'standard',
 question:'精算表の修正記入欄で、売上原価を算定するための仕訳として正しいものはどれか。',
 choices:['仕入（借）・繰越商品（貸）の1本だけ','期首：仕入（借）/繰越商品（貸）、期末：繰越商品（借）/仕入（貸）の2本','繰越商品（借）・仕入（貸）の1本だけ','売上勘定を修正する'],

 examFrequency:'high'},
{id:'C024',type:'choice',category:'worksheet',difficulty:'standard',

 choices:['貸借対照表欄の借方','損益計算書欄の借方','損益計算書欄の貸方','貸借対照表欄の貸方'],
 answer:1,
 explanation:'精算表の振り分けルール：費用（借方性）→損益計算書欄の借方。収益（貸方性）→損益計算書欄の貸方。資産（借方性）→貸借対照表欄の借方。負債・純資産（貸方性）→貸借対照表欄の貸方。勘定科目の性質で振り分けます。',
 examFrequency:'high'},
{id:'C025',type:'choice',category:'worksheet',difficulty:'advanced',

 explanation:'損益計算書欄：貸方（収益）>借方（費用）→当期純利益。差額を借方に記入して貸借を一致させ、同額を貸借対照表欄の貸方（純資産側）へ。逆に借方>貸方なら当期純損失→差額を貸方に記入し、貸借対照表欄の借方（資産側）へ。',
 examFrequency:'high'},
{id:'C026',type:'choice',category:'worksheet',difficulty:'advanced',

 explanation:'精算表の作成順序：①試算表欄（残高試算表の転記）→②修正記入欄（決算整理仕訳の記入）→③損益計算書欄・貸借対照表欄（修正後残高を各財務諸表欄に振り分け）→④当期純利益の記入。5欄精算表が基本形です。',

{id:'C027',type:'choice',category:'worksheet',difficulty:'standard',

const STORAGE_KEY='bookkeeping_progress_v3'
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}}
function saveProgressToStorage(data){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}catch{}}

// ===================== UTILS =====================
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]};return a}
function getCategoryStats(progress){
  const s={}
  for(const q of questions){
    if(!s[q.category])s[q.category]={total:0,answered:0,correct:0}
    s[q.category].total++
    const p=progress[q.id]
    if(p){s[q.category].answered++;if(p.correct)s[q.category].correct++}
  }
  return s
}

function JournalEntryInput({onSubmit,disabled}){
  const [da,setDa]=useState('');const [damt,setDamt]=useState('')
  const [ca,setCa]=useState('');const [camt,setCamt]=useState('')
  const [err,setErr]=useState('')
  function submit(){
    setErr('')
    if(!da||!ca){setErr('勘定科目を選択してください');return}
    const d=parseInt(damt,10),c=parseInt(camt,10)
    if(!d||!c){setErr('金額を入力してください');return}
    if(d!==c){setErr('借方・貸方の金額が一致していません');return}
    onSubmit({debitAccount:da,debitAmount:d,creditAccount:ca,creditAmount:c})
  }
  const sel=(val,onChange,cls)=>h('select',{value:val,onChange:e=>onChange(e.target.value),disabled,className:`flex-1 border rounded-lg px-3 py-2 bg-white focus:outline-none ${cls}`},

    const ok=debitAccount.trim()===q.answer.debit.account&&debitAmount===q.answer.debit.amount&&creditAccount.trim()===q.answer.credit.account&&creditAmount===q.answer.credit.amount
    setCorrect(ok);setAnswered(true);onAnswer(q.id,ok)
  }
  function handleChoice(i){if(answered)return;const ok=i===q.answer;setChosen(i);setCorrect(ok);setAnswered(true);onAnswer(q.id,ok)}
  function next(){setAnswered(false);setCorrect(false);setChosen(null);onNext()}

          return h('button',{key:i,onClick:()=>handleChoice(i),disabled:answered,style:{textAlign:'left',padding:'12px 16px',borderRadius:12,fontSize:15,fontWeight:500,background:bg,color,border,minHeight:48,cursor:answered?'default':'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.06)',opacity:answered&&i!==q.answer&&i!==chosen?0.5:1}},

// ===================== APP =====================
const SCREEN={HOME:'home',QUIZ:'quiz',RESULT:'result',INFINITE:'infinite',INFINITE_CHUNK:'chunk'}

function App(){
  const [progress,setProgress]=useState(loadProgress)
  const [screen,setScreen]=useState(SCREEN.HOME)
  const [quizQs,setQuizQs]=useState([])
  const [idx,setIdx]=useState(0)
  const [results,setResults]=useState({})
  const [isFullTest,setIsFullTest]=useState(false)
  const [infinitePool,setInfinitePool]=useState([])
  const [infiniteChunk,setInfiniteChunk]=useState([])
  const [infiniteChunkIdx,setInfiniteChunkIdx]=useState(0)
  const [infiniteChunkResults,setInfiniteChunkResults]=useState({})
  const [infiniteTotalAnswered,setInfiniteTotalAnswered]=useState(0)

  function saveAnswer(qid,ok){
    setProgress(prev=>{const u={...prev,[qid]:{correct:ok,attempts:(prev[qid]?.attempts||0)+1,lastAnswered:new Date().toISOString().slice(0,10)}};saveProgressToStorage(u);return u})
    setResults(prev=>({...prev,[qid]:ok}))
  }
  function saveInfiniteAnswer(qid,ok){
    setProgress(prev=>{const u={...prev,[qid]:{correct:ok,attempts:(prev[qid]?.attempts||0)+1,lastAnswered:new Date().toISOString().slice(0,10)}};saveProgressToStorage(u);return u})
    setInfiniteChunkResults(prev=>({...prev,[qid]:ok}))
  }

  function startCategory(cat){setQuizQs(shuffle(questions.filter(q=>q.category===cat)));setIdx(0);setResults({});setIsFullTest(false);setScreen(SCREEN.QUIZ)}
  function startRandom(){setQuizQs(shuffle(questions));setIdx(0);setResults({});setIsFullTest(true);setScreen(SCREEN.QUIZ)}
  function startWeak(){
    const weak=questions.filter(q=>{const p=progress[q.id];return p&&!p.correct})
    if(!weak.length){alert('苦手問題はまだありません！まず全問テストに挑戦してみましょう');return}
    setQuizQs(shuffle(weak));setIdx(0);setResults({});setIsFullTest(false);setScreen(SCREEN.QUIZ)
  }
  function handleNext(){if(idx+1>=quizQs.length)setScreen(SCREEN.RESULT);else setIdx(i=>i+1)}

  function startInfinite(wrongIds){
    const pool=questions.filter(q=>wrongIds.includes(q.id))
    setInfinitePool(pool)
    setInfiniteChunk(shuffle([...pool]).slice(0,INFINITE_CHUNK))
    setInfiniteChunkIdx(0);setInfiniteChunkResults({});setInfiniteTotalAnswered(0)
    setScreen(SCREEN.INFINITE)
  }
  function handleInfiniteNext(){
    if(infiniteChunkIdx+1>=infiniteChunk.length){setInfiniteTotalAnswered(t=>t+INFINITE_CHUNK);setScreen(SCREEN.INFINITE_CHUNK)}
    else setInfiniteChunkIdx(i=>i+1)
  }
  function continueInfinite(){
    setInfiniteChunk(shuffle([...infinitePool]).slice(0,INFINITE_CHUNK))
    setInfiniteChunkIdx(0);setInfiniteChunkResults({});setScreen(SCREEN.INFINITE)
  }
  function handleReviewWrong(wrongIds){setQuizQs(shuffle(quizQs.filter(q=>wrongIds.includes(q.id))));setIdx(0);setResults({});setScreen(SCREEN.QUIZ)}
  function handleRetry(){setQuizQs(shuffle(quizQs));setIdx(0);setResults({});setScreen(SCREEN.QUIZ)}

  const chunkCorrect=Object.values(infiniteChunkResults).filter(Boolean).length
  const style={fontFamily:"-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif",minHeight:'100vh',background:'#F8F9FA',maxWidth:480,margin:'0 auto'}

  return h('div',{style},
    screen===SCREEN.HOME&&h(HomeScreen,{progress,onStart:startCategory,onReview:startWeak,onRandom:startRandom}),
    screen===SCREEN.QUIZ&&h(QuizScreen,{qs:quizQs,idx,onAnswer:saveAnswer,onNext:handleNext,onHome:()=>setScreen(SCREEN.HOME),infiniteMode:false,infiniteTotal:0}),
    screen===SCREEN.RESULT&&h(ResultScreen,{qs:quizQs,results,isFullTest,onReviewWrong:handleReviewWrong,onInfinite:()=>startInfinite(Object.entries(results).filter(([,ok])=>!ok).map(([id])=>id)),onHome:()=>setScreen(SCREEN.HOME),onRetry:handleRetry}),
    screen===SCREEN.INFINITE&&h(QuizScreen,{qs:infiniteChunk,idx:infiniteChunkIdx,onAnswer:saveInfiniteAnswer,onNext:handleInfiniteNext,onHome:()=>setScreen(SCREEN.HOME),infiniteMode:true,infiniteTotal:infiniteTotalAnswered}),
    screen===SCREEN.INFINITE_CHUNK&&h(InfiniteChunkResult,{chunkCorrect,chunkTotal:INFINITE_CHUNK,totalAnswered:infiniteTotalAnswered+INFINITE_CHUNK,onContinue:continueInfinite,onHome:()=>setScreen(SCREEN.HOME)}))
}

ReactDOM.createRoot(document.getElementById('root')).render(h(React.StrictMode,null,h(App)))
</script>
</body>
</html>
