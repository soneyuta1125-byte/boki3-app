// ===================== PROGRESS =====================
const STORAGE_KEY = 'bookkeeping_progress'

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') } catch { return {} }
}
function saveProgressToStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)) } catch {}
}

// ===================== UTILS =====================
function shuffle(arr) {
  const a = [...arr]
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

function getCategoryStats(progress) {
  const stats = {}
  for (const q of questions) {
    if (!stats[q.category]) stats[q.category] = { total: 0, answered: 0, correct: 0 }
    stats[q.category].total++
    const p = progress[q.id]
    if (p) { stats[q.category].answered++; if (p.correct) stats[q.category].correct++ }
  }
  return stats
}

const { useState, useMemo, useCallback } = React
const h = React.createElement

// --- JournalEntryInput ---
function JournalEntryInput({ onSubmit, disabled }) {
  const [da, setDa] = useState('')
  const [damt, setDamt] = useState('')
  const [ca, setCa] = useState('')
  const [camt, setCamt] = useState('')
  const [err, setErr] = useState('')

  function submit() {
    setErr('')
    if (!da || !ca) { setErr('勘定科目を選択してください'); return }
    const d = parseInt(damt, 10), c = parseInt(camt, 10)
    if (!d || !c) { setErr('金額を入力してください'); return }
    if (d !== c) { setErr('借方・貸方の金額が一致していません'); return }
    onSubmit({ debitAccount: da, debitAmount: d, creditAccount: ca, creditAmount: c })
  }

  const sel = (val, onChange, cls) => h('select', {
    value: val, onChange: e => onChange(e.target.value), disabled,
    className: `flex-1 border rounded-lg px-3 py-2 bg-white focus:outline-none ${cls}`
  },
    h('option', { value: '' }, '勘定科目 ▼'),
    ...ACCOUNT_LIST.map(a => h('option', { key: a, value: a }, a))
  )

  const inp = (val, onChange, cls) => h('input', {
    type: 'number', inputMode: 'numeric', placeholder: '金額',
    value: val, onChange: e => onChange(e.target.value), disabled,
    className: `w-28 border rounded-lg px-3 py-2 focus:outline-none ${cls}`
  })

  return h('div', { className: 'space-y-3' },
    // Debit
    h('div', { className: 'bg-blue-50 rounded-xl p-4 border border-blue-200' },
      h('p', { className: 'text-xs font-bold text-blue-700 mb-2' }, '借方（デビット）'),
      h('div', { className: 'flex gap-2' },
        sel(da, setDa, 'border-blue-300 focus:ring-2 focus:ring-blue-400 disabled:opacity-50'),
        inp(damt, setDamt, 'border-blue-300 focus:ring-2 focus:ring-blue-400 disabled:opacity-50')
      )
    ),
    // Credit
    h('div', { className: 'bg-orange-50 rounded-xl p-4 border border-orange-200' },
      h('p', { className: 'text-xs font-bold text-orange-700 mb-2' }, '貸方（クレジット）'),
      h('div', { className: 'flex gap-2' },
        sel(ca, setCa, 'border-orange-300 focus:ring-2 focus:ring-orange-400 disabled:opacity-50'),
        inp(camt, setCamt, 'border-orange-300 focus:ring-2 focus:ring-orange-400 disabled:opacity-50')
      )
    ),
    err && h('p', { className: 'text-sm text-red-600 font-medium px-1' }, err),
    !disabled && h('button', {
      onClick: submit,
      className: 'w-full bg-primary text-white font-bold rounded-xl py-3 text-base active:opacity-80',
      style: { minHeight: 48, backgroundColor: '#1E3A5F' }
    }, '答え合わせ')
  )
}

// --- HomeScreen ---
function HomeScreen({ progress, onStart, onReview, onRandom }) {
  const stats = useMemo(() => getCategoryStats(progress), [progress])

  function rateColor(rate) {
    if (rate === null) return 'background:#fff;border:1px solid #e5e7eb'
    if (rate >= 0.8) return 'background:#f0fdf4;border:1px solid #86efac'
    if (rate >= 0.5) return 'background:#fefce8;border:1px solid #fde047'
    return 'background:#fef2f2;border:1px solid #fca5a5'
  }
  function rateLabelColor(rate) {
    if (rate === null) return '#9ca3af'
    if (rate >= 0.8) return '#16a34a'
    if (rate >= 0.5) return '#ca8a04'
    return '#dc2626'
  }
  function barColor(rate) {
    if (rate === null) return '#d1d5db'
    if (rate >= 0.8) return '#27AE60'
    if (rate >= 0.5) return '#F5A623'
    return '#E74C3C'
  }

  const total = questions.length
  const answered = Object.keys(progress).length
  const correct = Object.values(progress).filter(p => p.correct).length
  const overallRate = answered > 0 ? Math.round(correct / answered * 100) : 0

  return h('div', { className: 'pb-8' },
    // Hero
    h('div', { style: { background: '#1E3A5F', color: '#fff', padding: '32px 20px 40px' } },
      h('h1', { style: { fontSize: 22, fontWeight: 700, letterSpacing: '0.02em' } }, '簿記3級 過去問アプリ'),
      h('p', { style: { fontSize: 13, opacity: 0.8, marginTop: 4 } }, `全 ${total} 問 ・ 解答済 ${answered} 問 ・ 正答率 ${overallRate}%`)
    ),
    h('div', { style: { padding: '0 16px', marginTop: -16 } },
      // Buttons
      h('div', { className: 'flex gap-3 mb-3' },
        h('button', {
          onClick: onRandom,
          style: { flex: 1, background: '#F5A623', color: '#fff', fontWeight: 700, borderRadius: 12, padding: '12px 0', fontSize: 16, border: 'none', minHeight: 48, cursor: 'pointer' }
        }, '全問ランダム'),
        h('button', {
          onClick: onReview,
          style: { flex: 1, background: '#fff', color: '#1E3A5F', fontWeight: 700, borderRadius: 12, padding: '12px 0', fontSize: 16, border: '2px solid #1E3A5F', minHeight: 48, cursor: 'pointer' }
        }, '苦手を復習')
      ),
      h('p', { style: { fontSize: 11, fontWeight: 700, color: '#9ca3af', margin: '12px 0 8px 4px' } }, 'カテゴリ別'),
      ...Object.entries(CATEGORIES).map(([key, label]) => {
        const s = stats[key] || { total: 0, answered: 0, correct: 0 }
        const rate = s.answered > 0 ? s.correct / s.answered : null
        const pct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0
        return h('button', {
          key,
          onClick: () => onStart(key),
          style: {
            display: 'block', width: '100%', textAlign: 'left',
            borderRadius: 12, padding: '14px 16px', marginBottom: 8,
            boxShadow: '0 1px 4px rgba(0,0,0,.08)', cursor: 'pointer',
            ...Object.fromEntries(rateColor(rate).split(';').map(s => { const [k,v] = s.split(':'); return [k?.trim().replace(/-([a-z])/g, (_,c) => c.toUpperCase()), v?.trim()] }).filter(([k]) => k))
          }
        },
          h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
            h('span', { style: { fontWeight: 700, fontSize: 15, color: '#1f2937' } }, label),
            h('span', { style: { fontWeight: 700, fontSize: 14, color: rateLabelColor(rate) } },
              rate !== null ? `${Math.round(rate * 100)}%` : '未挑戦')
          ),
          h('div', { style: { fontSize: 12, color: '#6b7280', marginTop: 4 } }, `${s.total}問 ・ 回答済 ${s.answered}問`),
          h('div', { style: { marginTop: 8, background: '#e5e7eb', borderRadius: 4, height: 6, overflow: 'hidden' } },
            h('div', { style: { height: '100%', borderRadius: 4, background: barColor(rate), width: `${pct}%`, transition: 'width .3s' } })
          )
        )
      })
    )
  )
}

// --- QuizScreen ---
const DIFF_LABEL = { basic: '基礎', standard: '標準', advanced: '発展' }
const DIFF_BG = { basic: 'background:#dbeafe;color:#1d4ed8', standard: 'background:#fef9c3;color:#92400e', advanced: 'background:#fee2e2;color:#b91c1c' }

function QuizScreen({ qs, idx, onAnswer, onNext, onHome }) {
  const [answered, setAnswered] = useState(false)
  const [correct, setCorrect] = useState(false)
  const [chosen, setChosen] = useState(null)
  const q = qs[idx]

  function handleJournal({ debitAccount, debitAmount, creditAccount, creditAmount }) {
    const ok =
      debitAccount.trim() === q.answer.debit.account &&
      debitAmount === q.answer.debit.amount &&
      creditAccount.trim() === q.answer.credit.account &&
      creditAmount === q.answer.credit.amount
    setCorrect(ok); setAnswered(true); onAnswer(q.id, ok)
  }

  function handleChoice(i) {
    if (answered) return
    const ok = i === q.answer
    setChosen(i); setCorrect(ok); setAnswered(true); onAnswer(q.id, ok)
  }

  function next() { setAnswered(false); setCorrect(false); setChosen(null); onNext() }

  const diffStyle = DIFF_BG[q.difficulty] || ''

  return h('div', { className: 'pb-8' },
    // header
    h('div', { style: { background: '#1E3A5F', color: '#fff', padding: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
      h('button', { onClick: onHome, style: { color: '#fff', opacity: 0.8, fontSize: 14, border: 'none', background: 'transparent', cursor: 'pointer' } }, '← ホーム'),
      h('span', { style: { fontSize: 13, opacity: 0.8 } }, `${idx+1} / ${qs.length}`)
    ),
    h('div', { style: { background: '#1E3A5F', height: 4 } },
      h('div', { style: { height: '100%', background: '#F5A623', width: `${((idx+1)/qs.length)*100}%`, transition: 'width .3s' } })
    ),
    h('div', { style: { padding: '16px', display: 'flex', flexDirection: 'column', gap: 12 } },
      // badges
      h('div', { style: { display: 'flex', gap: 6, flexWrap: 'wrap' } },
        h('span', { style: { fontSize: 11, background: '#f3f4f6', color: '#4b5563', borderRadius: 20, padding: '2px 10px' } }, CATEGORIES[q.category]),
        h('span', { style: { fontSize: 11, borderRadius: 20, padding: '2px 10px', fontWeight: 600, ...Object.fromEntries(diffStyle.split(';').map(s => { const [k,v] = s.split(':'); return [k?.trim().replace(/-([a-z])/g, (_,c) => c.toUpperCase()), v?.trim()] }).filter(([k]) => k)) } }, DIFF_LABEL[q.difficulty]),
        q.examFrequency === 'high' && h('span', { style: { fontSize: 11, background: '#F5A623', color: '#fff', borderRadius: 20, padding: '2px 10px', fontWeight: 700 } }, '頻出')
      ),
      // question
      h('div', { style: { background: '#fff', borderRadius: 12, padding: '16px', boxShadow: '0 1px 4px rgba(0,0,0,.06)', border: '1px solid #f3f4f6' } },
        h('p', { style: { fontSize: 16, fontWeight: 500, color: '#111827', lineHeight: 1.7 } }, q.question)
      ),
      // input
      q.type === 'journal'
        ? h(JournalEntryInput, { onSubmit: handleJournal, disabled: answered })
        : h('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } },
            ...q.choices.map((c, i) => {
              let bg = '#fff', color = '#1f2937', border = '1px solid #e5e7eb'
              if (answered) {
                if (i === q.answer) { bg = '#27AE60'; color = '#fff'; border = '1px solid #27AE60' }
                else if (i === chosen) { bg = '#E74C3C'; color = '#fff'; border = '1px solid #E74C3C' }
                else { color = '#9ca3af' }
              }
              return h('button', {
                key: i, onClick: () => handleChoice(i), disabled: answered,
                style: { textAlign: 'left', padding: '12px 16px', borderRadius: 12, fontSize: 15, fontWeight: 500, background: bg, color, border, minHeight: 48, cursor: answered ? 'default' : 'pointer', boxShadow: '0 1px 3px rgba(0,0,0,.06)', opacity: answered && i !== q.answer && i !== chosen ? 0.5 : 1 }
              }, h('span', { style: { fontWeight: 700, marginRight: 8 } }, ['A','B','C','D'][i] + '.'), c)
            })
          ),
      // result
      answered && h('div', {
        style: { borderRadius: 12, padding: '14px 16px', background: correct ? '#f0fdf4' : '#fef2f2', border: `1px solid ${correct ? '#27AE60' : '#E74C3C'}` }
      },
        h('p', { style: { fontWeight: 700, fontSize: 18, color: correct ? '#27AE60' : '#E74C3C' } }, correct ? '正解！' : '不正解'),
        !correct && q.type === 'journal' && h('div', { style: { marginTop: 8, fontSize: 13, color: '#374151' } },
          h('p', { style: { fontWeight: 600, marginBottom: 4 } }, '正解：'),
          h('p', null, `借方：${q.answer.debit.account}  ¥${q.answer.debit.amount.toLocaleString()}`),
          h('p', null, `貸方：${q.answer.credit.account}  ¥${q.answer.credit.amount.toLocaleString()}`)
        )
      ),
      // explanation
      answered && h('div', { style: { background: '#eff6ff', borderRadius: 12, padding: '14px 16px', border: '1px solid #bfdbfe' } },
        h('p', { style: { fontSize: 11, fontWeight: 700, color: '#1d4ed8', marginBottom: 4 } }, '解説'),
        h('p', { style: { fontSize: 14, color: '#374151', lineHeight: 1.7 } }, q.explanation)
      ),
      // next button
      answered && h('button', {
        onClick: next,
        style: { width: '100%', background: '#1E3A5F', color: '#fff', fontWeight: 700, borderRadius: 12, padding: '12px 0', fontSize: 16, border: 'none', minHeight: 48, cursor: 'pointer' }
      }, idx + 1 < qs.length ? '次の問題 →' : '結果を見る →')
    )
  )
}

// --- ResultScreen ---
function ResultScreen({ qs, results, onReviewWrong, onHome, onRetry }) {
  const total = qs.length
  const correct = Object.values(results).filter(Boolean).length
  const rate = total > 0 ? Math.round(correct / total * 100) : 0
  const wrongIds = Object.entries(results).filter(([,ok]) => !ok).map(([id]) => id)

  const catMap = {}
  for (const q of qs) {
    if (!catMap[q.category]) catMap[q.category] = { total: 0, correct: 0 }
    catMap[q.category].total++
    if (results[q.id]) catMap[q.category].correct++
  }

  return h('div', { className: 'pb-8' },
    h('div', { style: { background: '#1E3A5F', color: '#fff', padding: '32px 20px 48px', textAlign: 'center' } },
      h('p', { style: { fontSize: 13, opacity: 0.8, marginBottom: 4 } }, 'セッション結果'),
      h('p', { style: { fontSize: 64, fontWeight: 700, lineHeight: 1 } }, `${rate}%`),
      h('p', { style: { fontSize: 14, opacity: 0.8, marginTop: 8 } }, `${correct} / ${total} 問正解`)
    ),
    h('div', { style: { padding: '0 16px', marginTop: -16, display: 'flex', flexDirection: 'column', gap: 12 } },
      h('div', { style: { background: '#fff', borderRadius: 12, padding: '16px', boxShadow: '0 1px 4px rgba(0,0,0,.08)' } },
        h('p', { style: { fontSize: 11, fontWeight: 700, color: '#9ca3af', marginBottom: 12 } }, 'カテゴリ別結果'),
        ...Object.entries(catMap).map(([cat, s]) => {
          const r = Math.round(s.correct / s.total * 100)
          const color = r >= 80 ? '#16a34a' : r >= 50 ? '#ca8a04' : '#dc2626'
          const barBg = r >= 80 ? '#27AE60' : r >= 50 ? '#F5A623' : '#E74C3C'
          return h('div', { key: cat, style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 } },
            h('span', { style: { flex: 1, fontSize: 13, color: '#374151' } }, CATEGORIES[cat]),
            h('span', { style: { fontWeight: 700, fontSize: 13, color, width: 40, textAlign: 'right' } }, `${r}%`),
            h('div', { style: { width: 60, background: '#e5e7eb', borderRadius: 4, height: 8, overflow: 'hidden' } },
              h('div', { style: { height: '100%', background: barBg, width: `${r}%` } })
            )
          )
        })
      ),
      wrongIds.length > 0 && h('button', {
        onClick: () => onReviewWrong(wrongIds),
        style: { width: '100%', background: '#E74C3C', color: '#fff', fontWeight: 700, borderRadius: 12, padding: '12px 0', fontSize: 16, border: 'none', minHeight: 48, cursor: 'pointer' }
      }, `間違えた ${wrongIds.length} 問を復習する`),
      h('button', {
        onClick: onRetry,
        style: { width: '100%', background: '#F5A623', color: '#fff', fontWeight: 700, borderRadius: 12, padding: '12px 0', fontSize: 16, border: 'none', minHeight: 48, cursor: 'pointer' }
      }, 'もう一度挑戦'),
      h('button', {
        onClick: onHome,
        style: { width: '100%', background: '#fff', color: '#1E3A5F', fontWeight: 700, borderRadius: 12, padding: '12px 0', fontSize: 16, border: '2px solid #1E3A5F', minHeight: 48, cursor: 'pointer' }
      }, 'ホームへ戻る')
    )
  )
}

// ===================== APP =====================
const SCREEN = { HOME: 'home', QUIZ: 'quiz', RESULT: 'result' }

function App() {
  const [progress, setProgress] = useState(loadProgress)
  const [screen, setScreen] = useState(SCREEN.HOME)
  const [quizQs, setQuizQs] = useState([])
  const [idx, setIdx] = useState(0)
  const [results, setResults] = useState({})

  function saveAnswer(qid, ok) {
    setProgress(prev => {
      const existing = prev[qid]
      const updated = { ...prev, [qid]: { correct: ok, attempts: (existing?.attempts||0)+1, lastAnswered: new Date().toISOString().slice(0,10) } }
      saveProgressToStorage(updated)
      return updated
    })
    setResults(prev => ({ ...prev, [qid]: ok }))
  }

  function startCategory(cat) {
    setQuizQs(shuffle(questions.filter(q => q.category === cat)))
    setIdx(0); setResults({}); setScreen(SCREEN.QUIZ)
  }

  function startRandom() {
    setQuizQs(shuffle(questions)); setIdx(0); setResults({}); setScreen(SCREEN.QUIZ)
  }

  function startWeak() {
    const weak = questions.filter(q => { const p = progress[q.id]; return p && !p.correct })
    if (!weak.length) { alert('苦手問題はまだありません。まず各カテゴリの問題を解いてみましょう！'); return }
    setQuizQs(shuffle(weak)); setIdx(0); setResults({}); setScreen(SCREEN.QUIZ)
  }

  function handleNext() {
    if (idx + 1 >= quizQs.length) setScreen(SCREEN.RESULT)
    else setIdx(i => i + 1)
  }

  function handleReviewWrong(wrongIds) {
    setQuizQs(shuffle(quizQs.filter(q => wrongIds.includes(q.id))))
    setIdx(0); setResults({}); setScreen(SCREEN.QUIZ)
  }

  function handleRetry() {
    setQuizQs(shuffle(quizQs)); setIdx(0); setResults({}); setScreen(SCREEN.QUIZ)
  }

  const style = { fontFamily: "-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif", minHeight: '100vh', background: '#F8F9FA', maxWidth: 480, margin: '0 auto' }

  return h('div', { style },
    screen === SCREEN.HOME && h(HomeScreen, { progress, onStart: startCategory, onReview: startWeak, onRandom: startRandom }),
    screen === SCREEN.QUIZ && h(QuizScreen, { qs: quizQs, idx, onAnswer: saveAnswer, onNext: handleNext, onHome: () => setScreen(SCREEN.HOME) }),
    screen === SCREEN.RESULT && h(ResultScreen, { qs: quizQs, results, onReviewWrong: handleReviewWrong, onHome: () => setScreen(SCREEN.HOME), onRetry: handleRetry })
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(h(React.StrictMode, null, h(App)))
</script>
</body>
</html>
