{id:'J005',type:'journal',category:'cash',difficulty:'standard',

{id:'J052',type:'journal',category:'cash',difficulty:'standard',

{id:'C051',type:'choice',category:'cash',difficulty:'advanced',

{id:'J009',type:'journal',category:'receivable',difficulty:'basic',

{id:'J010',type:'journal',category:'receivable',difficulty:'standard',

{id:'J054b',type:'journal',category:'receivable',difficulty:'standard',

{id:'J014',type:'journal',category:'fixedAsset',difficulty:'advanced',

{id:'C018',type:'choice',category:'balanceSheet',difficulty:'basic',

{id:'C019',type:'choice',category:'balanceSheet',difficulty:'basic',

 explanation:'1年基準（ワン・イヤー・ルール）：\n流動資産：1年以内に現金化される資産（現金・売掛金・繰越商品など）\n固定資産：1年を超えて保有する資産（建物・土地・長期貸付金など）\n売掛金は通常数ヶ月で回収されるため流動資産です。',examFrequency:'high'},

 choices:['①仕入（借）繰越商品（貸）の1本だけ','①期首：仕入（借）/繰越商品（貸）、②期末：繰越商品（借）/仕入（貸）の2本','③繰越商品（借）仕入（貸）の1本だけ','④売上勘定の借方に記入する'],

{id:'C024',type:'choice',category:'worksheet',difficulty:'standard',

{id:'C025',type:'choice',category:'worksheet',difficulty:'advanced',

{id:'J030',type:'journal',category:'worksheet',difficulty:'standard',
 question:'次の決算整理仕訳を示しなさい。\n支払家賃¥60,000のうち次期分¥6,000を前払費用に振り替えた。',

{id:'C069',type:'choice',category:'worksheet',difficulty:'standard',
 question:'精算表において「減価償却費」（修正記入後）はどの欄に記入されるか。',
 choices:['貸借対照表欄の借方','貸借対照表欄の貸方','損益計算書欄の借方','損益計算書欄の貸方'],
 answer:2,
 explanation:'減価償却費は「費用」→損益計算書欄の借方\nセットの「備品減価償却累計額」は「資産の評価勘定（控除）」→貸借対照表欄の貸方\n費用と評価勘定は異なる欄に記入される点が重要です。',examFrequency:'high'},

{id:'C070',type:'choice',category:'worksheet',difficulty:'advanced',

 choices:['損益計算書欄の借方','損益計算書欄の貸方','貸借対照表欄の借方','貸借対照表欄の貸方'],
 answer:3,
 explanation:'貸倒引当金は「資産の評価勘定（売掛金の控除項目）」→貸借対照表欄の貸方\n「貸倒引当金繰入」（費用）→損益計算書欄の借方\n同じ「貸倒引当金」という言葉でも、勘定科目の性質が違います。',examFrequency:'high'},

{id:'C071',type:'choice',category:'worksheet',difficulty:'advanced',

{id:'J063',type:'journal',category:'worksheet',difficulty:'advanced',

// ===== 税金・法人税等（10問） =====
{id:'T001',type:'journal',category:'tax',difficulty:'basic',

{id:'T002',type:'journal',category:'tax',difficulty:'standard',

{id:'T003',type:'journal',category:'tax',difficulty:'basic',

{id:'T004',type:'journal',category:'tax',difficulty:'standard',

{id:'T005',type:'journal',category:'tax',difficulty:'basic',

 explanation:'源泉所得税の納付：預り金（負債）が消滅し、現金が減少します。\n借方：預り金 ／ 貸方：現金\n会社は源泉徴収義務者として、従業員の所得税を給与から控除し代わりに納付します。',examFrequency:'high'},

{id:'TC001',type:'choice',category:'tax',difficulty:'basic',

{id:'TC002',type:'choice',category:'tax',difficulty:'standard',

{id:'TC003',type:'choice',category:'tax',difficulty:'basic',

 explanation:'未払法人税等は「負債の部（流動負債）」に分類されます。\n確定申告で確定した法人税等のうち、まだ納付していない金額です。\n「法人税等（費用）」→損益計算書　「未払法人税等（負債）」→貸借対照表、と区別しましょう。',examFrequency:'high'},

{id:'TC004',type:'choice',category:'tax',difficulty:'standard',

 answer:1,
 explanation:'源泉徴収の流れ：\n①給与支払時：借方 給料 ／ 貸方 現金（手取り額）・預り金（源泉税）\n②納付時：借方 預り金 ／ 貸方 現金\n会社は従業員の代わりに所得税を徴収して国に納める「源泉徴収義務者」です。',examFrequency:'high'},

{id:'TC005',type:'choice',category:'tax',difficulty:'advanced',

{id:'S003',type:'journal',category:'securities',difficulty:'standard',

{id:'S004',type:'journal',category:'securities',difficulty:'standard',
 question:'次の取引を仕訳しなさい。\n決算において、売買目的有価証券（帳簿価額¥200,000）の時価は¥230,000であった。',

{id:'S005',type:'journal',category:'securities',difficulty:'standard',

{id:'S006',type:'journal',category:'securities',difficulty:'basic',

{id:'SC001',type:'choice',category:'securities',difficulty:'basic',

{id:'SC003',type:'choice',category:'securities',difficulty:'standard',

{id:'SC004',type:'choice',category:'securities',difficulty:'basic',

const STORAGE_KEY='bookkeeping_v4'
function loadProgress(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}}
function saveProgressToStorage(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}}

// ===================== UTILS =====================
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]};return a}

function getCategoryStats(progress){
  const s={}
  for(const q of questions){
    if(!s[q.category])s[q.category]={total:0,answered:0,correct:0}
    s[q.category].total++
    const p=progress[q.id]
    if(p){s[q.category].answered++;if(p.correct)s[q.category].correct++}
  }
  return s
}

// 未回答優先ソート
function priorityShuffle(qs, progress){
  const unanswered=shuffle(qs.filter(q=>!progress[q.id]))
  const answered=shuffle(qs.filter(q=>progress[q.id]))
  return [...unanswered,...answered]
}

// 複合仕訳の採点（順不同で一致確認）
function checkJournal(userDebits,userCredits,q){
  const ud=userDebits.filter(x=>x.account&&x.amount>0)
  const uc=userCredits.filter(x=>x.account&&x.amount>0)
  const cd=q.answer.debits;const cc=q.answer.credits
  if(ud.length!==cd.length||uc.length!==cc.length)return false
  const srt=(a,b)=>a.account.localeCompare(b.account)
  const sUd=[...ud].sort(srt);const sCd=[...cd].sort(srt)
  const sUc=[...uc].sort(srt);const sCc=[...cc].sort(srt)
  return sUd.every((d,i)=>d.account===sCd[i].account&&d.amount===sCd[i].amount)&&
         sUc.every((c,i)=>c.account===sCc[i].account&&c.amount===sCc[i].amount)
}

const {useState,useMemo}=React
const h=React.createElement

function JournalRow({row,idx,update,color,disabled}){
  return h('div',{className:'flex gap-2 mb-1'},
    h('select',{value:row.account,onChange:e=>update(idx,'account',e.target.value),disabled,
      className:`flex-1 border rounded-lg px-2 py-2 bg-white focus:outline-none border-${color}-300 disabled:opacity-50`},
      h('option',{value:''},'勘定科目 ▼'),
      ...ACCOUNT_LIST.map(a=>h('option',{key:a,value:a},a))),
    h('input',{type:'text',inputMode:'numeric',pattern:'[0-9]*',placeholder:'金額',value:row.amount,
      autoComplete:'off',autoCorrect:'off',autoCapitalize:'off',spellCheck:false,
      onChange:e=>{const v=e.target.value.replace(/[^0-9]/g,'');update(idx,'amount',v)},disabled,
      className:`w-28 border rounded-lg px-2 py-2 focus:outline-none border-${color}-300 disabled:opacity-50`}))

// JournalEntryInput（複合仕訳対応）
function JournalEntryInput({q,onSubmit,disabled}){
  const dRows=q.answer.debits.length
  const cRows=q.answer.credits.length
  const empty={account:'',amount:''}
  const [debits,setDebits]=useState(Array.from({length:dRows},()=>({...empty})))
  const [credits,setCredits]=useState(Array.from({length:cRows},()=>({...empty})))
  const [err,setErr]=useState('')

  function updD(i,field,val){setDebits(prev=>{const n=[...prev];n[i]={...n[i],[field]:val};return n})}
  function updC(i,field,val){setCredits(prev=>{const n=[...prev];n[i]={...n[i],[field]:val};return n})}

  function submit(){
    setErr('')
    const ud=debits.map(d=>({account:d.account,amount:parseInt(d.amount,10)||0}))
    const uc=credits.map(c=>({account:c.account,amount:parseInt(c.amount,10)||0}))
    if(ud.some(d=>!d.account)||uc.some(c=>!c.account)){setErr('すべての勘定科目を選択してください');return}
    if(ud.some(d=>!d.amount)||uc.some(c=>!c.amount)){setErr('すべての金額を入力してください');return}
    const dSum=ud.reduce((s,d)=>s+d.amount,0)
    const cSum=uc.reduce((s,c)=>s+c.amount,0)
    if(dSum!==cSum){setErr(`借方合計¥${dSum.toLocaleString()} ≠ 貸方合計¥${cSum.toLocaleString()}（金額が一致していません）`);return}
    onSubmit(ud,uc)
  }


  return h('div',{className:'space-y-3'},
    h('div',{className:'bg-blue-50 rounded-xl p-4 border border-blue-200'},
      h('p',{className:'text-xs font-bold text-blue-700 mb-2'},`借方（デビット）${dRows>1?' ×'+dRows+'行':''}`),
      debits.map((row,i)=>h(JournalRow,{key:i,row,idx:i,update:updD,color:'blue',disabled}))),
    h('div',{className:'bg-orange-50 rounded-xl p-4 border border-orange-200'},
      h('p',{className:'text-xs font-bold text-orange-700 mb-2'},`貸方（クレジット）${cRows>1?' ×'+cRows+'行':''}`),
      credits.map((row,i)=>h(JournalRow,{key:i,row,idx:i,update:updC,color:'orange',disabled}))),
    err&&h('p',{className:'text-sm text-red-600 font-medium px-1'},err),
    !disabled&&h('button',{onClick:submit,style:{minHeight:48,backgroundColor:'#1E3A5F'},
      className:'w-full text-white font-bold rounded-xl py-3 text-base active:opacity-80'},'答え合わせ'))
}

        const s=stats[key]||{total:0,answered:0,correct:0}
        const r=s.answered>0?s.correct/s.answered:null
        const pct=s.total>0?Math.round(s.correct/s.total*100):0
        const unans=s.total-s.answered
        return h('button',{key,onClick:()=>onStart(key),style:{display:'block',width:'100%',textAlign:'left',borderRadius:12,padding:'12px 16px',marginBottom:8,boxShadow:'0 1px 4px rgba(0,0,0,.08)',cursor:'pointer',...rc(r)}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('span',{style:{fontWeight:700,fontSize:15,color:'#1f2937'}},label),
            h('span',{style:{fontWeight:700,fontSize:14,color:rlc(r)}},r!==null?`${Math.round(r*100)}%`:'未挑戦')),
          h('div',{style:{fontSize:11,color:'#6b7280',marginTop:3,display:'flex',gap:8}},
            h('span',null,s.total+'問'),
            s.answered>0&&h('span',null,'正解'+s.correct+'/解答済'+s.answered),
            unans>0&&h('span',{style:{color:'#f59e0b',fontWeight:600}},'未解答'+unans+'問')),
          h('div',{style:{marginTop:6,background:'#e5e7eb',borderRadius:4,height:5,overflow:'hidden'}},
            h('div',{style:{height:'100%',borderRadius:4,background:bc(r),width:`${pct}%`,transition:'width .3s'}})))
      })))
}

const DIFF_LABEL={basic:'基礎',standard:'標準',advanced:'発展'}
const DIFF_COLOR={basic:{bg:'#dbeafe',col:'#1d4ed8'},standard:{bg:'#fef9c3',col:'#92400e'},advanced:{bg:'#fee2e2',col:'#b91c1c'}}

function QuizScreen({qs,idx,onAnswer,onNext,onHome,infiniteMode,infiniteTotal}){
  const [answered,setAnswered]=useState(false)
  const [correct,setCorrect]=useState(false)
  const [chosen,setChosen]=useState(null)
  const [userDebits,setUserDebits]=useState(null)
  const [userCredits,setUserCredits]=useState(null)
  const q=qs[idx]

  function handleJournal(ud,uc){
    const ok=checkJournal(ud,uc,q)
    setCorrect(ok);setAnswered(true);setUserDebits(ud);setUserCredits(uc);onAnswer(q.id,ok)
  }
  function handleChoice(i){if(answered)return;const ok=i===q.answer;setChosen(i);setCorrect(ok);setAnswered(true);onAnswer(q.id,ok)}
  function next(){setAnswered(false);setCorrect(false);setChosen(null);setUserDebits(null);setUserCredits(null);onNext()}

  const prog=infiniteMode?`無限練習 第${(infiniteTotal||0)+idx+1}問`:`${idx+1} / ${qs.length}`
  const dc=DIFF_COLOR[q.difficulty]||DIFF_COLOR.basic

  // 問題文改行対応
  const lines=q.question.split('\n')
  const isCompound=q.type==='journal'&&(q.answer.debits.length>1||q.answer.credits.length>1)

  return h('div',{className:'pb-8'},
    h('div',{style:{background:'#1E3A5F',color:'#fff',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('button',{onClick:onHome,style:{color:'#fff',opacity:0.8,fontSize:13,border:'none',background:'transparent',cursor:'pointer'}},'← ホーム'),
      h('span',{style:{fontSize:13,opacity:0.9,fontWeight:600}},prog)),
    !infiniteMode&&h('div',{style:{background:'rgba(30,58,95,.3)',height:4}},
      h('div',{style:{height:'100%',background:'#F5A623',width:`${((idx+1)/qs.length)*100}%`,transition:'width .3s'}})),
    h('div',{style:{padding:'14px',display:'flex',flexDirection:'column',gap:10}},
      // バッジ
      h('div',{style:{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}},
        h('span',{style:{fontSize:11,background:'#f3f4f6',color:'#4b5563',borderRadius:20,padding:'2px 10px'}},CATEGORIES[q.category]),
        h('span',{style:{fontSize:11,borderRadius:20,padding:'2px 10px',fontWeight:600,background:dc.bg,color:dc.col}},DIFF_LABEL[q.difficulty]),
        q.examFrequency==='high'&&h('span',{style:{fontSize:11,background:'#F5A623',color:'#fff',borderRadius:20,padding:'2px 10px',fontWeight:700}},'頻出'),
        isCompound&&h('span',{style:{fontSize:11,background:'#7c3aed',color:'#fff',borderRadius:20,padding:'2px 10px',fontWeight:700}},'複合仕訳'),
        infiniteMode&&h('span',{style:{fontSize:11,background:'#7c3aed',color:'#fff',borderRadius:20,padding:'2px 10px',fontWeight:700}},'無限練習')),
      // 問題文
      h('div',{style:{background:'#fff',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #f3f4f6'}},
        lines.map((line,i)=>h('p',{key:i,style:{fontSize:15,fontWeight:i===0&&lines.length>1?600:500,color:line.startsWith('【')?'#7c3aed':'#111827',lineHeight:1.7,marginTop:i>0?4:0}},line))),
      // 入力
      q.type==='journal'
        ?h(JournalEntryInput,{q,onSubmit:handleJournal,disabled:answered})
        :h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
           ...q.choices.map((c,i)=>{
             let bg='#fff',color='#1f2937',border='1px solid #e5e7eb'
             if(answered){if(i===q.answer){bg='#27AE60';color='#fff';border='1px solid #27AE60'}
               else if(i===chosen){bg='#E74C3C';color='#fff';border='1px solid #E74C3C'}
               else color='#9ca3af'}
             return h('button',{key:i,onClick:()=>handleChoice(i),disabled:answered,
               style:{textAlign:'left',padding:'11px 14px',borderRadius:12,fontSize:14,fontWeight:500,
                 background:bg,color,border,minHeight:48,cursor:answered?'default':'pointer',
                 boxShadow:'0 1px 3px rgba(0,0,0,.06)',opacity:answered&&i!==q.answer&&i!==chosen?0.5:1}},
               h('span',{style:{fontWeight:700,marginRight:8}},['A','B','C','D'][i]+'.'),c)
           })),
      // 結果バナー
      answered&&h('div',{style:{borderRadius:12,padding:'12px 14px',background:correct?'#f0fdf4':'#fef2f2',border:`1px solid ${correct?'#27AE60':'#E74C3C'}`}},
        h('p',{style:{fontWeight:700,fontSize:17,color:correct?'#27AE60':'#E74C3C'}},correct?'正解！':'不正解'),
        !correct&&q.type==='journal'&&h('div',{style:{marginTop:8,fontSize:13,color:'#374151'}},
          h('p',{style:{fontWeight:600,marginBottom:4}},'【正解】'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}},
            h('div',null,q.answer.debits.map((d,i)=>h('p',{key:i},`借方：${d.account} ¥${d.amount.toLocaleString()}`))),
            h('div',null,q.answer.credits.map((c,i)=>h('p',{key:i},`貸方：${c.account} ¥${c.amount.toLocaleString()}`)))))),
      // 解説
      answered&&h('div',{style:{background:'#eff6ff',borderRadius:12,padding:'12px 14px',border:'1px solid #bfdbfe'}},
        h('p',{style:{fontSize:11,fontWeight:700,color:'#1d4ed8',marginBottom:5}},'解説'),
        q.explanation.split('\n').map((line,i)=>h('p',{key:i,style:{fontSize:13,color:'#374151',lineHeight:1.75,marginTop:i>0?3:0}},line))),
      // 次へ
      answered&&h('button',{onClick:next,style:{width:'100%',background:'#1E3A5F',color:'#fff',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'none',minHeight:48,cursor:'pointer'}},
        infiniteMode?'次の問題 →':(idx+1<qs.length?'次の問題 →':'結果を見る →'))))
}

// ResultScreen
function ResultScreen({qs,results,isFullTest,onReviewWrong,onInfinite,onHome,onRetry}){
  const total=qs.length
  const cor=Object.values(results).filter(Boolean).length
  const rate=total>0?Math.round(cor/total*100):0
  const passed=rate>=PASS_RATE*100
  const wrongIds=Object.entries(results).filter(([,ok])=>!ok).map(([id])=>id)
  const catMap={}
  for(const q of qs){if(!catMap[q.category])catMap[q.category]={total:0,correct:0};catMap[q.category].total++;if(results[q.id])catMap[q.category].correct++}
  return h('div',{className:'pb-8'},
    h('div',{style:{background:'#1E3A5F',color:'#fff',padding:'28px 20px 44px',textAlign:'center'}},
      h('p',{style:{fontSize:13,opacity:0.8,marginBottom:4}},isFullTest?'全問テスト結果':'セッション結果'),
      h('p',{style:{fontSize:60,fontWeight:700,lineHeight:1}},rate+'%'),
      h('p',{style:{fontSize:14,opacity:0.8,marginTop:6}},`${cor} / ${total} 問正解`),
      isFullTest&&h('div',{style:{marginTop:14,display:'inline-block',padding:'10px 24px',borderRadius:12,background:passed?'#27AE60':'#E74C3C',fontWeight:700,fontSize:17}},
        passed?'✓ 合格圏内（70%達成！）':'✗ 要復習（合格ライン70%未達）'),
      isFullTest&&h('p',{style:{marginTop:8,fontSize:12,opacity:0.75}},
        passed?'素晴らしい！本番でも合格できる実力です':'苦手分野を無限練習で克服しましょう！')),
    h('div',{style:{padding:'0 16px',marginTop:-14,display:'flex',flexDirection:'column',gap:10}},
      h('div',{style:{background:'#fff',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}},
        h('p',{style:{fontSize:11,fontWeight:700,color:'#9ca3af',marginBottom:10}},'カテゴリ別結果'),
        ...Object.entries(catMap).map(([cat,s])=>{
          const r=Math.round(s.correct/s.total*100)
          const col=r>=80?'#16a34a':r>=50?'#ca8a04':'#dc2626'
          return h('div',{key:cat,style:{display:'flex',alignItems:'center',gap:8,marginBottom:7}},
            h('span',{style:{flex:1,fontSize:13,color:'#374151'}},CATEGORIES[cat]),
            h('span',{style:{fontWeight:700,fontSize:13,color:col,width:38,textAlign:'right'}},r+'%'),
            h('div',{style:{width:56,background:'#e5e7eb',borderRadius:4,height:7,overflow:'hidden'}},
              h('div',{style:{height:'100%',background:r>=80?'#27AE60':r>=50?'#F5A623':'#E74C3C',width:r+'%'}})))
        })),
      wrongIds.length>0&&h('button',{onClick:onInfinite,style:{width:'100%',background:'#7c3aed',color:'#fff',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'none',minHeight:48,cursor:'pointer'}},
        `🔁 苦手問題を無限に練習する（${wrongIds.length}問プール）`),
      wrongIds.length>0&&h('button',{onClick:()=>onReviewWrong(wrongIds),style:{width:'100%',background:'#E74C3C',color:'#fff',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'none',minHeight:48,cursor:'pointer'}},
        `間違えた${wrongIds.length}問を1周復習`),
      h('button',{onClick:onRetry,style:{width:'100%',background:'#F5A623',color:'#fff',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'none',minHeight:48,cursor:'pointer'}},'もう一度挑戦'),
      h('button',{onClick:onHome,style:{width:'100%',background:'#fff',color:'#1E3A5F',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'2px solid #1E3A5F',minHeight:48,cursor:'pointer'}},'ホームへ戻る')))
}

function InfiniteChunkResult({chunkCorrect,chunkTotal,totalAnswered,onContinue,onHome}){
  const rate=Math.round(chunkCorrect/chunkTotal*100)
  return h('div',{className:'pb-8'},
    h('div',{style:{background:'#7c3aed',color:'#fff',padding:'28px 20px 36px',textAlign:'center'}},
      h('p',{style:{fontSize:13,opacity:0.8,marginBottom:4}},'無限練習 中間チェック'),
      h('p',{style:{fontSize:52,fontWeight:700,lineHeight:1}},rate+'%'),
      h('p',{style:{fontSize:14,opacity:0.8,marginTop:6}},`直近${chunkTotal}問: ${chunkCorrect}問正解 ・ 累計${totalAnswered}問`)),
    h('div',{style:{padding:'14px',display:'flex',flexDirection:'column',gap:10}},
      h('div',{style:{background:'#fff',borderRadius:12,padding:'16px',textAlign:'center',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}},
        rate>=70
          ?h('p',{style:{color:'#27AE60',fontWeight:700,fontSize:15}},'✓ 合格ライン達成！この調子で続けましょう')
          :h('p',{style:{color:'#E74C3C',fontWeight:700,fontSize:15}},`あと${70-rate}%で合格ライン！繰り返し練習が大切です`)),
      h('button',{onClick:onContinue,style:{width:'100%',background:'#7c3aed',color:'#fff',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'none',minHeight:48,cursor:'pointer'}},'次の10問へ →'),
      h('button',{onClick:onHome,style:{width:'100%',background:'#fff',color:'#1E3A5F',fontWeight:700,borderRadius:12,padding:'12px 0',fontSize:15,border:'2px solid #1E3A5F',minHeight:48,cursor:'pointer'}},'ホームへ戻る')))
}

// ===================== APP =====================
const SCREEN={HOME:'home',QUIZ:'quiz',RESULT:'result',INFINITE:'infinite',CHUNK:'chunk'}

function App(){
  const [progress,setProgress]=useState(loadProgress)
  const [screen,setScreen]=useState(SCREEN.HOME)
  const [quizQs,setQuizQs]=useState([])
  const [idx,setIdx]=useState(0)
  const [results,setResults]=useState({})
  const [isFullTest,setIsFullTest]=useState(false)
  const [infinitePool,setInfinitePool]=useState([])
  const [infiniteChunk,setInfiniteChunk]=useState([])
  const [infiniteChunkIdx,setInfiniteChunkIdx]=useState(0)
  const [infiniteChunkResults,setInfiniteChunkResults]=useState({})
  const [infiniteTotalAnswered,setInfiniteTotalAnswered]=useState(0)

  function saveAns(qid,ok){
    setProgress(prev=>{const u={...prev,[qid]:{correct:ok,attempts:(prev[qid]?.attempts||0)+1,lastAnswered:new Date().toISOString().slice(0,10)}};saveProgressToStorage(u);return u})
    setResults(prev=>({...prev,[qid]:ok}))
  }
  function saveInfAns(qid,ok){
    setProgress(prev=>{const u={...prev,[qid]:{correct:ok,attempts:(prev[qid]?.attempts||0)+1,lastAnswered:new Date().toISOString().slice(0,10)}};saveProgressToStorage(u);return u})
    setInfiniteChunkResults(prev=>({...prev,[qid]:ok}))
  }

  function startCategory(cat){
    setQuizQs(priorityShuffle(questions.filter(q=>q.category===cat),progress))
    setIdx(0);setResults({});setIsFullTest(false);setScreen(SCREEN.QUIZ)
  }
  function startRandom(){
    // 未回答を優先、その後回答済みをランダム
    setQuizQs(priorityShuffle(questions,progress))
    setIdx(0);setResults({});setIsFullTest(true);setScreen(SCREEN.QUIZ)
  }
  function startWeak(){
    const weak=questions.filter(q=>{const p=progress[q.id];return p&&!p.correct})
    if(!weak.length){alert('苦手問題はまだありません！まず全問テストに挑戦してみましょう');return}
    setQuizQs(shuffle(weak));setIdx(0);setResults({});setIsFullTest(false);setScreen(SCREEN.QUIZ)
  }
  function handleNext(){if(idx+1>=quizQs.length)setScreen(SCREEN.RESULT);else setIdx(i=>i+1)}

  function startInfinite(wrongIds){
    const pool=questions.filter(q=>wrongIds.includes(q.id))
    setInfinitePool(pool)
    setInfiniteChunk(shuffle([...pool]).slice(0,INFINITE_CHUNK))
    setInfiniteChunkIdx(0);setInfiniteChunkResults({});setInfiniteTotalAnswered(0)
    setScreen(SCREEN.INFINITE)
  }
  function handleInfiniteNext(){
    if(infiniteChunkIdx+1>=infiniteChunk.length){setInfiniteTotalAnswered(t=>t+INFINITE_CHUNK);setScreen(SCREEN.CHUNK)}
    else setInfiniteChunkIdx(i=>i+1)
  }
  function continueInfinite(){
    setInfiniteChunk(shuffle([...infinitePool]).slice(0,INFINITE_CHUNK))
    setInfiniteChunkIdx(0);setInfiniteChunkResults({});setScreen(SCREEN.INFINITE)
  }
  function handleReviewWrong(wrongIds){setQuizQs(shuffle(quizQs.filter(q=>wrongIds.includes(q.id))));setIdx(0);setResults({});setScreen(SCREEN.QUIZ)}
  function handleRetry(){setQuizQs(priorityShuffle(quizQs,progress));setIdx(0);setResults({});setScreen(SCREEN.QUIZ)}

  const chunkCor=Object.values(infiniteChunkResults).filter(Boolean).length
  const style={fontFamily:"-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif",minHeight:'100vh',background:'#F8F9FA',maxWidth:480,margin:'0 auto'}

  return h('div',{style},
    screen===SCREEN.HOME&&h(HomeScreen,{progress,onStart:startCategory,onReview:startWeak,onRandom:startRandom}),
    screen===SCREEN.QUIZ&&h(QuizScreen,{qs:quizQs,idx,onAnswer:saveAns,onNext:handleNext,onHome:()=>setScreen(SCREEN.HOME),infiniteMode:false,infiniteTotal:0}),
    screen===SCREEN.RESULT&&h(ResultScreen,{qs:quizQs,results,isFullTest,onReviewWrong:handleReviewWrong,onInfinite:()=>startInfinite(Object.entries(results).filter(([,ok])=>!ok).map(([id])=>id)),onHome:()=>setScreen(SCREEN.HOME),onRetry:handleRetry}),
    screen===SCREEN.INFINITE&&h(QuizScreen,{qs:infiniteChunk,idx:infiniteChunkIdx,onAnswer:saveInfAns,onNext:handleInfiniteNext,onHome:()=>setScreen(SCREEN.HOME),infiniteMode:true,infiniteTotal:infiniteTotalAnswered}),
    screen===SCREEN.CHUNK&&h(InfiniteChunkResult,{chunkCorrect:chunkCor,chunkTotal:INFINITE_CHUNK,totalAnswered:infiniteTotalAnswered+INFINITE_CHUNK,onContinue:continueInfinite,onHome:()=>setScreen(SCREEN.HOME)}))
}

ReactDOM.createRoot(document.getElementById('root')).render(h(React.StrictMode,null,h(App)))
</script>
